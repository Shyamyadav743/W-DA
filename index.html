<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #d0f0c0; /* Light Green Background */
            animation: fadeIn 1.5s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        header {
            background-color: #8BC34A; /* Green theme color */
            padding: 20px;
            text-align: center;
            animation: slideDown 1s ease-in-out;
            width: 100%;
        }

        @keyframes slideDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        header nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        header nav a:hover {
            color: #333;
        }

        main {
            padding: 20px;
            text-align: center;
        }

        .unit {
            margin: 10px 0;
            padding: 10px;
            background-color: #A5D6A7; /* Light Green background for each unit */
            border: 1px solid #4CAF50;
            border-radius: 8px;
            width: 50%;
            transition: transform 0.3s ease-in-out;
            text-align: center;
        }

        .unit:hover {
            transform: scale(1.05);
        }

        .unit button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            width: 80%;
        }

        .unit button:hover {
            background-color: #388E3C;
        }

        footer {
            background-color: #8BC34A;
            text-align: center;
            padding: 10px;
            width: 100%;
            animation: fadeIn 1.5s ease-in-out;
        }

        footer p {
            margin: 0;
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="#home">Home</a>
            <a href="#content">Content</a>
            <a href="#about">About</a>
        </nav>
    </header>

    <main>
        <section id="home" class="unit">
            <h2>Unit 1</h2>
            <button onclick="location.href='unit1.html'">Go to Unit 1</button>
        </section>

        <section id="unit2" class="unit">
            <h2>Unit 2</h2>
            <button onclick="location.href='unit2.html'">Go to Unit 2</button>
        </section>

        <section id="unit3" class="unit">
            <h2>Unit 3</h2>
            <button onclick="location.href='unit3.html'">Go to Unit 3</button>
        </section>

        <section id="unit4" class="unit">
            <h2>Unit 4</h2>
            <button onclick="location.href='unit4.html'">Go to Unit 4</button>
        </section>

        <section id="unit5" class="unit">
            <h2>Unit 5</h2>
            <button onclick="location.href='unit5.html'">Go to Unit 5</button>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 My Website. Shyam Yadav.</p>
    </footer>

</body>
</html>
