<!DOCTYPE html>
<html>

<head>
    <title>Shyam Yadav | Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            color: white;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
            scroll-behavior: smooth;
        }
        
        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        
        nav {
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            position: sticky;
            top: 0;
        }
        
        nav a {
            margin: 0 15px;
            color: white;
            text-decoration: none;
        }
        
        .toggle {
            float: right;
            cursor: pointer;
        }
        
        header {
            text-align: center;
            padding: 30px;
        }
        
        header img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
        }
        
        h1 {
            text-shadow: 0 0 10px #00ffff;
        }
        
        .typing {
            color: #00ffff;
            font-size: 18px;
        }
        
        section {
            padding: 20px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            margin: 15px 0;
            border-radius: 15px;
        }
        
        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }
        
        .project {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
        }
        /* BUTTON */
        
        .btn {
            padding: 10px 20px;
            border: 2px solid #00ffff;
            border-radius: 25px;
            color: white;
            text-decoration: none;
        }
        
        .btn:hover {
            background: #00ffff;
            color: black;
        }
        /* CALCULATOR */
        
        .calc {
            margin-top: 10px;
            background: #111;
            padding: 10px;
            border-radius: 10px;
            max-width: 220px;
        }
        
        .calc input {
            width: 100%;
            height: 40px;
            text-align: right;
            font-size: 18px;
            margin-bottom: 10px;
        }
        
        .buttons button {
            width: 23%;
            margin: 2px;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: #00ffff;
            cursor: pointer;
        }
        /* CONTACT */
        
        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 10px;
            border: none;
        }
        
        button {
            padding: 10px 20px;
            background: #00ffff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        
        footer {
            text-align: center;
            padding: 15px;
        }
        
        .whatsapp-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #25D366;
            padding: 15px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
        }
    </style>
</head>

<body>

    <!-- NAV -->
    <nav>
        <a href="#">Home</a>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>

        <span class="toggle" onclick="toggleMode()">🌙</span>
    </nav>

    <!-- HEADER -->
    <header>
        <img src="photo.jpg">
        <h1>Shyam Yadav</h1>
        <p class="typing" id="typing"></p>
    </header>

    <section>

        <!-- ABOUT -->
        <div class="card" id="about">
            <h2>About Me</h2>
            <p>I am learning web development and building projects.</p>
            <a href="mailto:shyamyadav080077@gmail.com" class="btn">Email Me</a>
        </div>

        <!-- PROJECTS -->
        <div class="card" id="projects">
            <h2>Projects</h2>

            <div class="projects">

                <div class="project">
                    <h3>Portfolio Website</h3>
                    <p>My website</p>
                </div>

                <div class="project">
                    <h3>Calculator App</h3>

                    <div class="calc">
                        <input type="text" id="display" readonly>

                        <div class="buttons">
                            <button onclick="press('7')">7</button>
                            <button onclick="press('8')">8</button>
                            <button onclick="press('9')">9</button>
                            <button onclick="press('/')">/</button>

                            <button onclick="press('4')">4</button>
                            <button onclick="press('5')">5</button>
                            <button onclick="press('6')">6</button>
                            <button onclick="press('*')">*</button>

                            <button onclick="press('1')">1</button>
                            <button onclick="press('2')">2</button>
                            <button onclick="press('3')">3</button>
                            <button onclick="press('-')">-</button>

                            <button onclick="press('0')">0</button>
                            <button onclick="press('.')">.</button>
                            <button onclick="calculate()">=</button>
                            <button onclick="press('+')">+</button>

                            <button onclick="clearDisplay()" style="width:100%">C</button>
                        </div>
                    </div>

                </div>

            </div>
        </div>

        <!-- CONTACT -->
        <div class="card" id="contact">
            <h2>Contact Me</h2>

            <form action="https://formspree.io/f/YOUR_ID" method="POST">
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="message" placeholder="Message" required></textarea>
                <br><br>
                <button type="submit">Send</button>
            </form>

            <p>📞 <a href="tel:+9779704914727" style="color:white;">Call</a></p>
            <p>📧 <a href="mailto:shyamyadav080077@gmail.com" style="color:white;">Email</a></p>
        </div>

    </section>

    <!-- WHATSAPP -->
    <a class="whatsapp-btn" href="https://wa.me/9779704914727">💬</a>

    <footer>
        <p>© 2026 Shyam Yadav</p>
    </footer>

    <!-- SCRIPT -->
    <script>
        // typing
        const text = ["Web Developer 💻", "Learning JavaScript 🚀", "Future Programmer 😎"];
        let i = 0,
            j = 0,
            isDeleting = false;

        function type() {
            let current = text[i];

            if (!isDeleting) j++;
            else j--;

            document.getElementById("typing").innerHTML = current.substring(0, j);

            if (j === current.length) isDeleting = true;
            if (j === 0) {
                isDeleting = false;
                i = (i + 1) % text.length;
            }

            setTimeout(type, isDeleting ? 50 : 100);
        }

        type();

        // calculator
        function press(val) {
            document.getElementById("display").value += val;
        }

        function calculate() {
            try {
                document.getElementById("display").value =
                    eval(document.getElementById("display").value);
            } catch {
                alert("Error");
            }
        }

        function clearDisplay() {
            document.getElementById("display").value = "";
        }

        // dark/light
        function toggleMode() {
            document.body.classList.toggle("light");
        }
    </script>

</body>

</html>
