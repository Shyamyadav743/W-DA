<!DOCTYPE html>

    <title>My Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        
        header {
            background-color: #FFD700; /* Yellow theme color */
            padding: 20px;
            text-align: center;
        }

        header nav a {
            color: black;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        header nav a:hover {
            color: #333;
        }

        main {
            padding: 20px;
        }

        .unit {
            margin: 10px 0;
            padding: 10px;
            background-color: #FFEB3B; /* Light yellow background for each unit */
            border: 1px solid #FF9800;
            border-radius: 8px;
            width: 50%;
        }

        footer {
            background-color: #FFD700;
            text-align: center;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }

        footer p {
            margin: 0;
            color: black;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="#home">Home</a>
